<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Инвентаризация</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; }
        .btn:hover { background: #0056b3; }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #1e7e34; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #a71d2a; }
        .panel { background: white; padding: 20px; border-radius: 12px; max-width: 800px; margin: 0 auto; }
        #log { background: #f8f9fa; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body>

<div class="panel">
    <h1>🗺️ Инвентаризация</h1>
    <p>Нажмите кнопку — должна появиться надпись</p>
    
    <button class="btn" id="btn1">Кнопка 1</button>
    <button class="btn btn-success" id="btn2">Кнопка 2</button>
    <button class="btn btn-danger" id="btn3">Кнопка 3</button>
    
    <div id="log">📌 Жду нажатия...</div>
</div>

<script>
// ============================================================
// ПРОСТОЙ ТЕСТ
// ============================================================
console.log('✅ Скрипт запустился!');

document.getElementById('btn1').addEventListener('click', function() {
    document.getElementById('log').innerHTML = '✅ Нажата Кнопка 1';
    alert('Кнопка 1 работает!');
});

document.getElementById('btn2').addEventListener('click', function() {
    document.getElementById('log').innerHTML = '✅ Нажата Кнопка 2';
    alert('Кнопка 2 работает!');
});

document.getElementById('btn3').addEventListener('click', function() {
    document.getElementById('log').innerHTML = '✅ Нажата Кнопка 3';
    alert('Кнопка 3 работает!');
});

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('log').innerHTML = '✅ Страница загружена! Нажмите любую кнопку.';
    console.log('✅ DOM загружен');
});
</script>
</body>
</html>
