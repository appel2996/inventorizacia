<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Инвентаризация</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .panel { background: white; padding: 20px; border-radius: 12px; max-width: 1200px; margin: 0 auto; }
        .btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; font-size: 14px; }
        .btn:hover { background: #0056b3; }
        .btn-green { background: #28a745; }
        .btn-green:hover { background: #1e7e34; }
        .btn-red { background: #dc3545; }
        .btn-red:hover { background: #a71d2a; }
        .btn-yellow { background: #ffc107; color: #333; }
        .btn-yellow:hover { background: #e0a800; }
        #map { width: 100%; height: 500px; border: 2px dashed #007bff; border-radius: 12px; margin: 10px 0; display: flex; align-items: center; justify-content: center; background: #f8f9fa; position: relative; overflow: hidden; }
        #map img { max-width: 100%; max-height: 100%; object-fit: contain; }
        #info { margin-top: 10px; padding: 15px; background: #f8f9fa; border-radius: 8px; min-height: 100px; }
        .log { background: #e9ecef; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 13px; color: #333; }
        .flex { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
        input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; flex: 1; min-width: 150px; }
    </style>
</head>
<body>

<div class="panel">
    <h1>🗺️ Инвентаризация</h1>
    
    <div class="flex">
        <button class="btn" id="loadImageBtn">🖼️ Загрузить план</button>
        <button class="btn btn-green" id="markupBtn">⚡ Разметка</button>
        <button class="btn btn-red" id="clearBtn">🗑️ Сброс</button>
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
    </div>
    
    <div id="map">
        <p style="color:#999;">Нажмите «Загрузить план»</p>
    </div>
    
    <div id="info">
        <p><b>📋 Информация:</b></p>
        <div id="log">Ожидание действий...</div>
    </div>
</div>

<script>
// ============================================================
// ПРОСТАЯ ВЕРСИЯ — ВСЁ РАБОТАЕТ
// ============================================================

console.log('✅ Скрипт запущен!');

// Элементы
var map = document.getElementById('map');
var log = document.getElementById('log');
var fileInput = document.getElementById('fileInput');
var loadImageBtn = document.getElementById('loadImageBtn');
var markupBtn = document.getElementById('markupBtn');
var clearBtn = document.getElementById('clearBtn');

// Данные
var currentImage = null;
var zones = [];
var tableCount = 0;

// ============================================================
// 1. ЗАГРУЗКА КАРТИНКИ
// ============================================================
loadImageBtn.addEventListener('click', function() {
    log.innerHTML = '📂 Выберите файл...';
    fileInput.click();
});

fileInput.addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    
    log.innerHTML = '⏳ Загрузка: ' + file.name;
    
    var reader = new FileReader();
    reader.onload = function(ev) {
        currentImage = ev.target.result;
        map.innerHTML = '<img src="' + currentImage + '" />';
        log.innerHTML = '✅ Картинка загружена! Размер: ' + file.size + ' байт. Нажмите «Разметка».';
    };
    reader.readAsDataURL(file);
    this.value = '';
});

// ============================================================
// 2. РАЗМЕТКА (создаём зоны на картинке)
// ============================================================
markupBtn.addEventListener('click', function() {
    var img = map.querySelector('img');
    if (!img) {
        log.innerHTML = '❌ Сначала загрузите картинку!';
        alert('Сначала загрузите картинку!');
        return;
    }
    
    // Ждём полной загрузки картинки
    if (!img.complete || img.naturalWidth === 0) {
        log.innerHTML = '⏳ Картинка ещё не загружена...';
        img.onload = function() { doMarkup(); };
        return;
    }
    doMarkup();
});

function doMarkup() {
    var img = map.querySelector('img');
    var rect = map.getBoundingClientRect();
    var imgRect = img.getBoundingClientRect();
    
    // Получаем размеры
    var mapW = map.clientWidth;
    var mapH = map.clientHeight;
    var imgW = img.naturalWidth;
    var imgH = img.naturalHeight;
    
    log.innerHTML = '📐 Размер картинки: ' + imgW + 'x' + imgH + ', размер карты: ' + mapW + 'x' + mapH;
    
    // Создаём 136 столов (17x8)
    var cols = 17;
    var rows = 8;
    var cellW = mapW / (cols + 1);
    var cellH = mapH / (rows + 1);
    
    // Очищаем старые зоны
    var oldZones = map.querySelectorAll('.zone');
    oldZones.forEach(function(el) { el.remove(); });
    
    zones = [];
    var tableNum = 1;
    
    for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
            if (tableNum > 136) break;
            
            var x = c * cellW + cellW * 0.2;
            var y = r * cellH + cellH * 0.2;
            var w = cellW * 0.6;
            var h = cellH * 0.6;
            
            // Создаём зону
            var div = document.createElement('div');
            div.className = 'zone';
            div.style.position = 'absolute';
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.style.width = w + 'px';
            div.style.height = h + 'px';
            div.style.border = '2px solid #007bff';
            div.style.background = 'rgba(0,123,255,0.15)';
            div.style.cursor = 'pointer';
            div.style.borderRadius = '4px';
            div.style.display = 'flex';
            div.style.alignItems = 'center';
            div.style.justifyContent = 'center';
            div.style.color = '#007bff';
            div.style.fontSize = '12px';
            div.style.fontWeight = 'bold';
            div.textContent = '№' + tableNum;
            
            // Добавляем событие клика
            (function(t) {
                div.addEventListener('click', function() {
                    log.innerHTML = '📍 Нажат стол №' + t + '!';
                    alert('Нажат стол №' + t);
                });
            })(tableNum);
            
            map.appendChild(div);
            zones.push({ table: tableNum, x: x, y: y, w: w, h: h });
            tableNum++;
        }
        if (tableNum > 136) break;
    }
    
    log.innerHTML = '✅ Создано ' + zones.length + ' зон для столов! Нажмите на любой синий прямоугольник.';
}

// ============================================================
// 3. СБРОС
// ============================================================
clearBtn.addEventListener('click', function() {
    if (!confirm('Удалить всё?')) return;
    map.innerHTML = '<p style="color:#999;">Нажмите «Загрузить план»</p>';
    currentImage = null;
    zones = [];
    log.innerHTML = '🗑️ Всё очищено. Загрузите новый план.';
});

// ============================================================
// 4. ЛОГ В КОНСОЛЬ
// ============================================================
console.log('✅ Всё готово! Нажмите "Загрузить план", выберите картинку, затем "Разметка".');
</script>
</body>
</html>
