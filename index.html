<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Инвентаризация</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { padding: 20px; background: #f0f2f5; }
        .panel { background: white; padding: 20px; border-radius: 12px; max-width: 1200px; margin: 0 auto; }
        .btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; font-size: 14px; }
        .btn:hover { background: #0056b3; }
        .btn-green { background: #28a745; }
        .btn-green:hover { background: #1e7e34; }
        .btn-red { background: #dc3545; }
        .btn-red:hover { background: #a71d2a; }
        .btn-yellow { background: #ffc107; color: #333; }
        .btn-yellow:hover { background: #e0a800; }
        .btn-purple { background: #6f42c1; color: white; }
        .btn-purple:hover { background: #5a32a3; }
        .btn-orange { background: #fd7e14; color: white; }
        .btn-orange:hover { background: #e06b0a; }
        .btn-teal { background: #20c997; color: white; }
        .btn-teal:hover { background: #1aa179; }
        .btn-pink { background: #e83e8c; color: white; }
        .btn-pink:hover { background: #c21a6d; }
        
        .flex { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; align-items: center; }
        
        #image-list { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
        .image-item { border: 2px solid #dee2e6; border-radius: 8px; padding: 8px; background: white; cursor: pointer; width: 150px; text-align: center; position: relative; }
        .image-item.active { border-color: #007bff; background: #e9ecef; }
        .image-item img { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; }
        .image-item .name { font-size: 12px; margin-top: 4px; }
        .image-item .del-btn { position: absolute; top: -8px; right: -8px; background: #dc3545; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 14px; }
        .image-item .zone-count { font-size: 10px; color: #666; }
        
        #map { width: 100%; min-height: 500px; border: 2px dashed #007bff; border-radius: 12px; margin: 10px 0; background: #f8f9fa; position: relative; overflow: hidden; }
        #map img { width: 100%; height: auto; display: block; }
        #map .placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #999; font-size: 18px; text-align: center; }
        
        .zone { position: absolute; border: 2px solid #007bff; background: rgba(0,123,255,0.15); cursor: pointer; }
        .zone:hover { background: rgba(255,0,0,0.25); border-color: red; }
        .zone.active { border-color: red; border-width: 3px; background: rgba(255,0,0,0.2); }
        .zone.hidden { opacity: 0; pointer-events: none; }
        .zone-label { position: absolute; top: -18px; left: 2px; font-size: 10px; background: white; padding: 0 4px; border-radius: 3px; font-weight: bold; }
        .zone .del-zone { position: absolute; top: -18px; right: 0; background: #dc3545; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-size: 10px; display: none; }
        .zone:hover .del-zone { display: block; }
        
        #info { margin-top: 10px; padding: 15px; background: #f8f9fa; border-radius: 8px; }
        .log { background: #e9ecef; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 13px; max-height: 150px; overflow-y: auto; }
        input[type="file"] { display: none; }
        
        .table-grid { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0; max-height: 120px; overflow-y: auto; }
        .table-badge { background: #007bff; color: white; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; position: relative; }
        .table-badge:hover { transform: scale(1.1); }
        .table-badge.active { background: #dc3545; }
        .table-badge .del-badge { position: absolute; top: -6px; right: -6px; background: #dc3545; color: white; border: none; border-radius: 50%; width: 16px; height: 16px; cursor: pointer; font-size: 10px; display: none; }
        .table-badge:hover .del-badge { display: block; }
        .table-badge.hidden-badge { opacity: 0.4; }
        
        #device-list { max-height: 300px; overflow-y: auto; }
        .device-item { padding: 6px 12px; margin: 4px 0; background: #f8f9fa; border-left: 4px solid #007bff; border-radius: 4px; font-size: 13px; }
        .table-header { font-size: 16px; font-weight: bold; padding: 8px 12px; background: #e9ecef; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="panel">
    <h1>🗺️ Инвентаризация</h1>
    
    <div class="flex">
        <button class="btn btn-yellow" onclick="document.getElementById('fileInput').click()">📂 Загрузить картинку</button>
        <button class="btn btn-purple" id="drawBtn">✏️ Рисовать столы</button>
        <button class="btn btn-green" id="finishBtn" style="display:none;">✅ Закончить</button>
        <button class="btn btn-orange" onclick="deselectAll()">🔽 Снять выделение</button>
        <button class="btn btn-teal" onclick="showAll()">👁️ Показать все</button>
        <button class="btn btn-pink" onclick="hideAll()">🙈 Скрыть все</button>
        <button class="btn btn-red" onclick="clearAll()">🗑️ Очистить всё</button>
        <input type="file" id="fileInput" accept="image/*" multiple onchange="loadFiles(this)">
    </div>
    
    <div id="image-list"></div>
    
    <div id="map" onclick="handleMapClick(event)">
        <div class="placeholder">Загрузите картинку</div>
    </div>
    
    <div id="info">
        <b>📋 Информация:</b>
        <div class="log" id="log">Ожидание действий...</div>
        <div class="table-grid" id="tableGrid"></div>
        <div id="deviceList"></div>
    </div>
</div>

<script>
// ============================================================
// ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
// ============================================================
var images = [];
var currentIndex = -1;
var drawMode = false;
var isDrawing = false;
var startX, startY;
var tableCounter = 0;
var selectedTable = null;
var zonesVisible = true;

// ============================================================
// 1. ЗАГРУЗКА КАРТИНОК
// ============================================================
function loadFiles(input) {
    var files = input.files;
    if (!files || files.length === 0) return;
    
    for (var i = 0; i < files.length; i++) {
        var file = files[i];
        var reader = new FileReader();
        reader.onload = function(ev) {
            images.push({
                name: file.name,
                data: ev.target.result,
                zones: []
            });
            renderImages();
            if (images.length === 1) {
                currentIndex = 0;
                showImage(0);
            }
            logMsg('✅ Загружено: ' + images.length + ' картинок');
        };
        reader.readAsDataURL(file);
    }
    input.value = '';
}

// ============================================================
// 2. ОТОБРАЖЕНИЕ СПИСКА КАРТИНОК
// ============================================================
function renderImages() {
    var html = '';
    for (var i = 0; i < images.length; i++) {
        var img = images[i];
        var active = (i === currentIndex) ? ' active' : '';
        html += '<div class="image-item' + active + '" onclick="showImage(' + i + ')">';
        html += '<img src="' + img.data + '" />';
        html += '<div class="name">' + img.name + '</div>';
        html += '<div class="zone-count">Столов: ' + img.zones.length + '</div>';
        html += '<button class="del-btn" onclick="event.stopPropagation();deleteImage(' + i + ')">×</button>';
        html += '</div>';
    }
    document.getElementById('image-list').innerHTML = html;
}

// ============================================================
// 3. УДАЛЕНИЕ КАРТИНКИ
// ============================================================
function deleteImage(index) {
    if (!confirm('Удалить картинку?')) return;
    images.splice(index, 1);
    if (currentIndex >= images.length) currentIndex = images.length - 1;
    if (images.length === 0) {
        document.getElementById('map').innerHTML = '<div class="placeholder">Загрузите картинку</div>';
        currentIndex = -1;
        document.getElementById('tableGrid').innerHTML = '';
        document.getElementById('deviceList').innerHTML = '';
    } else {
        showImage(currentIndex);
    }
    renderImages();
    logMsg('🗑️ Картинка удалена');
}

// ============================================================
// 4. ПОКАЗ КАРТИНКИ
// ============================================================
function showImage(index) {
    if (index < 0 || index >= images.length) return;
    currentIndex = index;
    var img = images[index];
    
    var map = document.getElementById('map');
    map.innerHTML = '';
    var imgEl = document.createElement('img');
    imgEl.src = img.data;
    imgEl.style.width = '100%';
    imgEl.style.height = 'auto';
    imgEl.style.display = 'block';
    map.appendChild(imgEl);
    
    // Восстанавливаем зоны
    for (var i = 0; i < img.zones.length; i++) {
        var z = img.zones[i];
        createZone(z.table, z.x, z.y, z.w, z.h);
    }
    
    if (!zonesVisible) {
        document.querySelectorAll('.zone').forEach(function(el) {
            el.classList.add('hidden');
        });
        document.querySelectorAll('.table-badge').forEach(function(el) {
            el.classList.add('hidden-badge');
        });
    }
    
    renderTableGrid();
    document.getElementById('deviceList').innerHTML = '<p style="color:#999;">Выберите стол</p>';
    selectedTable = null;
    renderImages();
    logMsg('🖼️ ' + img.name + ' (столов: ' + img.zones.length + ')');
}

// ============================================================
// 5. РИСОВАНИЕ СТОЛОВ
// ============================================================
document.getElementById('drawBtn').onclick = function() {
    if (currentIndex < 0 || images.length === 0) {
        alert('Сначала загрузите картинку!');
        return;
    }
    drawMode = !drawMode;
    this.textContent = drawMode ? '❌ Отменить' : '✏️ Рисовать столы';
    document.getElementById('finishBtn').style.display = drawMode ? 'inline-block' : 'none';
    document.getElementById('map').style.cursor = drawMode ? 'crosshair' : 'default';
    logMsg(drawMode ? '✏️ Режим рисования' : '⏹ Режим выключен');
};

document.getElementById('finishBtn').onclick = function() {
    drawMode = false;
    document.getElementById('drawBtn').textContent = '✏️ Рисовать столы';
    this.style.display = 'none';
    document.getElementById('map').style.cursor = 'default';
    logMsg('✅ Рисование завершено');
};

function handleMapClick(e) {
    if (!drawMode) return;
    var target = e.target;
    if (target.tagName !== 'IMG') return;
    
    var rect = document.getElementById('map').getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;
    
    // Просто добавляем стол по клику
    tableCounter++;
    var num = tableCounter;
    var size = 40;
    var zx = x - size/2;
    var zy = y - size/2;
    
    var img = images[currentIndex];
    img.zones.push({ table: num, x: zx, y: zy, w: size, h: size });
    createZone(num, zx, zy, size, size);
    
    if (!zonesVisible) {
        var zones = document.querySelectorAll('.zone');
        for (var i = 0; i < zones.length; i++) {
            if (parseInt(zones[i].dataset.table) === num) {
                zones[i].classList.add('hidden');
            }
        }
    }
    
    renderTableGrid();
    logMsg('✅ Добавлен стол №' + num);
}

// ============================================================
// 6. СОЗДАНИЕ ЗОНЫ
// ============================================================
function createZone(num, x, y, w, h) {
    var div = document.createElement('div');
    div.className = 'zone';
    div.style.left = x + 'px';
    div.style.top = y + 'px';
    div.style.width = w + 'px';
    div.style.height = h + 'px';
    div.dataset.table = num;
    
    var label = document.createElement('span');
    label.className = 'zone-label';
    label.textContent = '№' + num;
    div.appendChild(label);
    
    var del = document.createElement('button');
    del.className = 'del-zone';
    del.textContent = '×';
    del.onclick = function(e) {
        e.stopPropagation();
        deleteTable(num);
    };
    div.appendChild(del);
    
    div.onclick = function(e) {
        if (e.target.tagName === 'BUTTON') return;
        selectTable(num);
    };
    
    document.getElementById('map').appendChild(div);
}

// ============================================================
// 7. УДАЛЕНИЕ СТОЛА
// ============================================================
function deleteTable(num) {
    if (!confirm('Удалить стол №' + num + '?')) return;
    
    var img = images[currentIndex];
    for (var i = 0; i < img.zones.length; i++) {
        if (img.zones[i].table === num) {
            img.zones.splice(i, 1);
            break;
        }
    }
    
    var zones = document.querySelectorAll('.zone');
    for (var i = 0; i < zones.length; i++) {
        if (parseInt(zones[i].dataset.table) === num) {
            zones[i].remove();
        }
    }
    
    if (selectedTable === num) {
        selectedTable = null;
        document.getElementById('deviceList').innerHTML = '<p style="color:#999;">Выберите стол</p>';
    }
    
    renderTableGrid();
    logMsg('🗑️ Стол №' + num + ' удалён');
}

// ============================================================
// 8. ВЫБОР СТОЛА
// ============================================================
function selectTable(num) {
    selectedTable = num;
    
    document.querySelectorAll('.zone').forEach(function(el) {
        el.classList.remove('active');
        if (parseInt(el.dataset.table) === num) el.classList.add('active');
    });
    
    document.querySelectorAll('.table-badge').forEach(function(el) {
        el.classList.remove('active');
        if (parseInt(el.textContent) === num) el.classList.add('active');
    });
    
    // Тестовые устройства
    var items = [];
    var types = ['Монитор', 'Системный блок', 'Ноутбук'];
    var names = ['Иванов', 'Петров', 'Сидоров'];
    for (var i = 0; i < 2 + Math.floor(Math.random() * 2); i++) {
        items.push({
            id: 'IT-' + types[i % 3].substring(0,3).toUpperCase() + '-' + String(num).padStart(3,'0') + (i+1),
            type: types[i % 3],
            sn: 'SN' + String(Math.random()).substring(2,8).toUpperCase(),
            person: names[Math.floor(Math.random() * names.length)],
            table: num
        });
    }
    
    renderDevices(items, num);
    logMsg('📍 Выбран стол №' + num);
}

// ============================================================
// 9. ОТОБРАЖЕНИЕ УСТРОЙСТВ
// ============================================================
function renderDevices(items, num) {
    var container = document.getElementById('deviceList');
    if (!items || items.length === 0) {
        container.innerHTML = '<p style="color:#999;">📍 Стол №' + num + ' — нет оборудования</p>';
        return;
    }
    var html = '<div class="table-header"><span>📍 Стол №' + num + '</span><span>Всего: ' + items.length + '</span></div>';
    for (var i = 0; i < items.length; i++) {
        var item = items[i];
        html += '<div class="device-item"><b>' + item.id + '</b> — ' + item.type + ' (SN: ' + item.sn + ') 👤 ' + item.person + '</div>';
    }
    container.innerHTML = html;
}

// ============================================================
// 10. СЕТКА СТОЛОВ
// ============================================================
function renderTableGrid() {
    if (currentIndex < 0 || currentIndex >= images.length) {
        document.getElementById('tableGrid').innerHTML = '';
        return;
    }
    var img = images[currentIndex];
    var html = '';
    for (var i = 0; i < img.zones.length; i++) {
        var z = img.zones[i];
        var hidden = zonesVisible ? '' : ' hidden-badge';
        html += '<div class="table-badge' + hidden + '" onclick="selectTable(' + z.table + ')">';
        html += z.table;
        html += '<button class="del-badge" onclick="event.stopPropagation();deleteTable(' + z.table + ')">×</button>';
        html += '</div>';
    }
    document.getElementById('tableGrid').innerHTML = html;
}

// ============================================================
// 11. ПОКАЗАТЬ / СКРЫТЬ
// ============================================================
function showAll() {
    zonesVisible = true;
    document.querySelectorAll('.zone').forEach(function(el) {
        el.classList.remove('hidden');
    });
    document.querySelectorAll('.table-badge').forEach(function(el) {
        el.classList.remove('hidden-badge');
    });
    logMsg('👁️ Все выделения показаны');
}

function hideAll() {
    zonesVisible = false;
    document.querySelectorAll('.zone').forEach(function(el) {
        el.classList.add('hidden');
    });
    document.querySelectorAll('.table-badge').forEach(function(el) {
        el.classList.add('hidden-badge');
    });
    deselectAll();
    logMsg('🙈 Все выделения скрыты');
}

function deselectAll() {
    selectedTable = null;
    document.querySelectorAll('.zone').forEach(function(el) {
        el.classList.remove('active');
    });
    document.querySelectorAll('.table-badge').forEach(function(el) {
        el.classList.remove('active');
    });
    document.getElementById('deviceList').innerHTML = '<p style="color:#999;">Выберите стол</p>';
    logMsg('🔽 Выделение снято');
}

// ============================================================
// 12. СБРОС
// ============================================================
function clearAll() {
    if (!confirm('Удалить всё?')) return;
    images = [];
    currentIndex = -1;
    tableCounter = 0;
    document.getElementById('map').innerHTML = '<div class="placeholder">Загрузите картинку</div>';
    document.getElementById('image-list').innerHTML = '';
    document.getElementById('tableGrid').innerHTML = '';
    document.getElementById('deviceList').innerHTML = '';
    logMsg('🗑️ Всё очищено');
}

// ============================================================
// 13. ЛОГ
// ============================================================
function logMsg(msg) {
    document.getElementById('log').innerHTML = msg;
}

// ============================================================
// 14. ЗАПУСК
// ============================================================
logMsg('✅ Готово! Загрузите картинку, включите режим рисования и кликайте на карте.');
console.log('✅ Инвентаризация запущена!');
</script>
</body>
</html>
