<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Инвентаризация</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { padding: 20px; background: #f0f2f5; }
        .panel { background: white; padding: 20px; border-radius: 12px; max-width: 1200px; margin: 0 auto; }
        .btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; font-size: 14px; }
        .btn:hover { background: #0056b3; }
        .btn-green { background: #28a745; }
        .btn-green:hover { background: #1e7e34; }
        .btn-red { background: #dc3545; }
        .btn-red:hover { background: #a71d2a; }
        .btn-yellow { background: #ffc107; color: #333; }
        .btn-yellow:hover { background: #e0a800; }
        .btn-purple { background: #6f42c1; color: white; }
        .btn-purple:hover { background: #5a32a3; }
        .btn-orange { background: #fd7e14; color: white; }
        .btn-orange:hover { background: #e06b0a; }
        .btn-teal { background: #20c997; color: white; }
        .btn-teal:hover { background: #1aa179; }
        .btn-pink { background: #e83e8c; color: white; }
        .btn-pink:hover { background: #c21a6d; }
        
        .flex { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; align-items: center; }
        
        #image-list { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
        .image-item { border: 2px solid #dee2e6; border-radius: 8px; padding: 8px; background: white; cursor: pointer; transition: 0.3s; width: 150px; text-align: center; position: relative; }
        .image-item:hover { border-color: #007bff; }
        .image-item.active { border-color: #007bff; background: #e9ecef; }
        .image-item img { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; }
        .image-item .name { font-size: 12px; margin-top: 4px; color: #333; }
        .image-item .del-btn { position: absolute; top: -8px; right: -8px; background: #dc3545; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 14px; line-height: 1; }
        .image-item .del-btn:hover { background: #a71d2a; }
        .image-item .zone-count { font-size: 10px; color: #666; }
        
        #map { width: 100%; min-height: 500px; border: 2px dashed #007bff; border-radius: 12px; margin: 10px 0; background: #f8f9fa; position: relative; overflow: hidden; }
        #map img { width: 100%; height: auto; display: block; }
        #map .placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #999; font-size: 18px; text-align: center; }
        
        .zone { position: absolute; border: 2px solid #007bff; background: rgba(0,123,255,0.15); cursor: pointer; transition: opacity 0.3s; }
        .zone:hover { background: rgba(255,0,0,0.25); border-color: red; }
        .zone.active { border-color: red; border-width: 3px; background: rgba(255,0,0,0.2); }
        .zone.hidden { opacity: 0; pointer-events: none; }
        .zone-label { position: absolute; top: -18px; left: 2px; font-size: 10px; background: white; padding: 0 4px; border-radius: 3px; font-weight: bold; }
        .zone .delete-zone-btn { position: absolute; top: -18px; right: 0; background: #dc3545; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-size: 10px; line-height: 1; display: none; }
        .zone:hover .delete-zone-btn { display: block; }
        
        #info { margin-top: 10px; padding: 15px; background: #f8f9fa; border-radius: 8px; min-height: 100px; }
        .log { background: #e9ecef; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 13px; color: #333; white-space: pre-wrap; max-height: 150px; overflow-y: auto; }
        input[type="file"] { display: none; }
        
        .drawing { border-color: red !important; background: rgba(255,0,0,0.1) !important; }
        .selected-table { background: #cfe2ff; padding: 5px 10px; border-radius: 4px; margin: 2px; display: inline-block; }
        .table-grid { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0; max-height: 120px; overflow-y: auto; }
        .table-badge { background: #007bff; color: white; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; position: relative; }
        .table-badge:hover { transform: scale(1.1); }
        .table-badge.active { background: #dc3545; }
        .table-badge .delete-badge { position: absolute; top: -6px; right: -6px; background: #dc3545; color: white; border: none; border-radius: 50%; width: 16px; height: 16px; cursor: pointer; font-size: 10px; line-height: 1; display: none; }
        .table-badge:hover .delete-badge { display: block; }
        .table-badge.hidden-badge { opacity: 0.4; }
        
        #device-list { max-height: 300px; overflow-y: auto; }
        .device-item { padding: 6px 12px; margin: 4px 0; background: #f8f9fa; border-left: 4px solid #007bff; border-radius: 4px; font-size: 13px; }
        .table-header { font-size: 16px; font-weight: bold; padding: 8px 12px; background: #e9ecef; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .no-select { user-select: none; }
        
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; }
        .visibility-indicator { font-size: 12px; color: #666; margin-left: 10px; }
    </style>
</head>
<body>

<div class="panel">
    <h1>🗺️ Инвентаризация</h1>
    
    <div class="flex">
        <button class="btn btn-yellow" id="loadImageBtn">📂 Загрузить картинку</button>
        <button class="btn btn-purple" id="drawModeBtn">✏️ Рисовать столы</button>
        <button class="btn btn-green" id="finishDrawBtn" style="display:none;">✅ Закончить рисование</button>
        <button class="btn btn-orange" id="deselectBtn">🔽 Снять выделение</button>
        <button class="btn btn-teal" id="showAllBtn">👁️ Показать все</button>
        <button class="btn btn-pink" id="hideAllBtn">🙈 Скрыть все</button>
        <button class="btn btn-red" id="clearBtn">🗑️ Очистить всё</button>
        <input type="file" id="fileInput" accept="image/*" multiple>
    </div>
    
    <div id="image-list"></div>
    
    <div id="map">
        <div class="placeholder">Загрузите картинку и нажмите «Рисовать столы»</div>
    </div>
    
    <div id="info">
        <p><b>📋 Информация:</b></p>
        <div id="log">Ожидание действий...</div>
        <div id="table-grid" class="table-grid"></div>
        <div id="device-list"></div>
    </div>
</div>

<script>
// ============================================================
// ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
// ============================================================
var images = [];
var currentImageIndex = -1;
var drawMode = false;
var isDrawing = false;
var startX, startY, currentRect;
var tableCounter = 0;
var selectedTable = null;
var inventory = [];
var zonesVisible = true;

// Элементы
var map = document.getElementById('map');
var log = document.getElementById('log');
var fileInput = document.getElementById('fileInput');
var imageList = document.getElementById('image-list');
var tableGrid = document.getElementById('table-grid');
var deviceList = document.getElementById('device-list');

// ============================================================
// 1. ЗАГРУЗКА КАРТИНОК
// ============================================================
document.getElementById('loadImageBtn').addEventListener('click', function() {
    fileInput.click();
});

fileInput.addEventListener('change', function(e) {
    var files = e.target.files;
    if (!files || files.length === 0) return;
    
    for (var i = 0; i < files.length; i++) {
        var file = files[i];
        var reader = new FileReader();
        reader.onload = function(ev) {
            var dataUrl = ev.target.result;
            var id = 'img_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
            images.push({ id: id, name: file.name, data: dataUrl, zones: [] });
            renderImageList();
            if (images.length === 1) {
                currentImageIndex = 0;
                showImage(0);
            }
            log.innerHTML = '✅ Загружено картинок: ' + images.length;
        };
        reader.readAsDataURL(file);
    }
    this.value = '';
});

// ============================================================
// 2. УДАЛЕНИЕ ОДНОЙ КАРТИНКИ
// ============================================================
function deleteImage(index) {
    if (index < 0 || index >= images.length) return;
    if (!confirm('Удалить картинку "' + images[index].name + '" со всеми столами?')) return;
    
    images.splice(index, 1);
    if (currentImageIndex >= images.length) currentImageIndex = images.length - 1;
    if (images.length === 0) {
        map.innerHTML = '<div class="placeholder">Загрузите картинку</div>';
        currentImageIndex = -1;
        tableGrid.innerHTML = '';
        deviceList.innerHTML = '';
    } else {
        showImage(currentImageIndex);
    }
    renderImageList();
    log.innerHTML = '🗑️ Картинка удалена. Осталось: ' + images.length;
}

// ============================================================
// 3. ОТОБРАЖЕНИЕ СПИСКА КАРТИНОК
// ============================================================
function renderImageList() {
    var html = '';
    for (var i = 0; i < images.length; i++) {
        var img = images[i];
        var active = (i === currentImageIndex) ? ' active' : '';
        html += '<div class="image-item' + active + '" data-index="' + i + '">';
        html += '<img src="' + img.data + '" />';
        html += '<div class="name">' + img.name + '</div>';
        html += '<div class="zone-count">Столов: ' + img.zones.length + '</div>';
        html += '<button class="del-btn" data-index="' + i + '" title="Удалить картинку">×</button>';
        html += '</div>';
    }
    imageList.innerHTML = html;
    
    imageList.querySelectorAll('.image-item').forEach(function(el) {
        var index = parseInt(el.dataset.index);
        el.addEventListener('click', function(e) {
            if (e.target.classList.contains('del-btn')) return;
            currentImageIndex = index;
            showImage(index);
            renderImageList();
        });
    });
    
    imageList.querySelectorAll('.del-btn').forEach(function(el) {
        var index = parseInt(el.dataset.index);
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            deleteImage(index);
        });
    });
}

// ============================================================
// 4. ПОКАЗ КАРТИНКИ
// ============================================================
function showImage(index) {
    if (index < 0 || index >= images.length) return;
    var img = images[index];
    currentImageIndex = index;
    
    map.innerHTML = '';
    var imgEl = document.createElement('img');
    imgEl.src = img.data;
    imgEl.style.width = '100%';
    imgEl.style.height = 'auto';
    imgEl.style.display = 'block';
    map.appendChild(imgEl);
    
    var zonesData = img.zones || [];
    for (var i = 0; i < zonesData.length; i++) {
        var z = zonesData[i];
        createZoneElement(z.table, z.x, z.y, z.w, z.h);
    }
    
    // Применяем текущее состояние видимости
    if (!zonesVisible) {
        document.querySelectorAll('.zone').forEach(function(el) {
            el.classList.add('hidden');
        });
        document.querySelectorAll('.table-badge').forEach(function(el) {
            el.classList.add('hidden-badge');
        });
    }
    
    log.innerHTML = '🖼️ ' + img.name + ' (столов: ' + zonesData.length + ')';
    renderTableGrid();
    selectedTable = null;
    deviceList.innerHTML = '<p style="color:#999;">Выберите стол</p>';
}

// ============================================================
// 5. ПОКАЗАТЬ / СКРЫТЬ ВСЕ ВЫДЕЛЕНИЯ
// ============================================================
document.getElementById('showAllBtn').addEventListener('click', function() {
    zonesVisible = true;
    document.querySelectorAll('.zone').forEach(function(el) {
        el.classList.remove('hidden');
    });
    document.querySelectorAll('.table-badge').forEach(function(el) {
        el.classList.remove('hidden-badge');
    });
    log.innerHTML = '👁️ Все выделения показаны';
});

document.getElementById('hideAllBtn').addEventListener('click', function() {
    zonesVisible = false;
    document.querySelectorAll('.zone').forEach(function(el) {
        el.classList.add('hidden');
    });
    document.querySelectorAll('.table-badge').forEach(function(el) {
        el.classList.add('hidden-badge');
    });
    // Снимаем выделение со стола
    selectedTable = null;
    document.querySelectorAll('.zone').forEach(function(el) {
        el.classList.remove('active');
    });
    document.querySelectorAll('.table-badge').forEach(function(el) {
        el.classList.remove('active');
    });
    deviceList.innerHTML = '<p style="color:#999;">Выберите стол</p>';
    log.innerHTML = '🙈 Все выделения скрыты';
});

// ============================================================
// 6. РИСОВАНИЕ СТОЛОВ
// ============================================================
document.getElementById('drawModeBtn').addEventListener('click', function() {
    if (currentImageIndex < 0 || images.length === 0) {
        alert('Сначала загрузите картинку!');
        return;
    }
    drawMode = !drawMode;
    this.textContent = drawMode ? '❌ Отменить рисование' : '✏️ Рисовать столы';
    document.getElementById('finishDrawBtn').style.display = drawMode ? 'inline-block' : 'none';
    map.style.cursor = drawMode ? 'crosshair' : 'default';
    log.innerHTML = drawMode ? '✏️ Режим рисования: нажмите на карте и растяните прямоугольник' : '⏹ Режим рисования выключен';
});

document.getElementById('finishDrawBtn').addEventListener('click', function() {
    drawMode = false;
    document.getElementById('drawModeBtn').textContent = '✏️ Рисовать столы';
    this.style.display = 'none';
    map.style.cursor = 'default';
    log.innerHTML = '✅ Рисование завершено. Столов: ' + (images[currentImageIndex]?.zones?.length || 0);
});

// Рисование на карте
map.addEventListener('mousedown', function(e) {
    if (!drawMode) return;
    if (e.target.tagName === 'IMG') {
        var rect = map.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;
        isDrawing = true;
        
        currentRect = document.createElement('div');
        currentRect.style.position = 'absolute';
        currentRect.style.border = '2px dashed red';
        currentRect.style.background = 'rgba(255,0,0,0.1)';
        currentRect.style.pointerEvents = 'none';
        currentRect.style.left = startX + 'px';
        currentRect.style.top = startY + 'px';
        currentRect.style.width = '0px';
        currentRect.style.height = '0px';
        map.appendChild(currentRect);
    }
});

document.addEventListener('mousemove', function(e) {
    if (!isDrawing || !currentRect) return;
    var rect = map.getBoundingClientRect();
    var currentX = e.clientX - rect.left;
    var currentY = e.clientY - rect.top;
    
    var x = Math.min(startX, currentX);
    var y = Math.min(startY, currentY);
    var w = Math.abs(currentX - startX);
    var h = Math.abs(currentY - startY);
    
    currentRect.style.left = x + 'px';
    currentRect.style.top = y + 'px';
    currentRect.style.width = w + 'px';
    currentRect.style.height = h + 'px';
});

document.addEventListener('mouseup', function(e) {
    if (!isDrawing || !currentRect) return;
    
    var rect = map.getBoundingClientRect();
    var currentX = e.clientX - rect.left;
    var currentY = e.clientY - rect.top;
    
    var x = Math.min(startX, currentX);
    var y = Math.min(startY, currentY);
    var w = Math.abs(currentX - startX);
    var h = Math.abs(currentY - startY);
    
    if (w > 20 && h > 20) {
        tableCounter++;
        var tableNum = tableCounter;
        
        var img = images[currentImageIndex];
        img.zones.push({ table: tableNum, x: x, y: y, w: w, h: h });
        
        createZoneElement(tableNum, x, y, w, h);
        
        // Если зоны скрыты, скрываем новую
        if (!zonesVisible) {
            var zones = map.querySelectorAll('.zone');
            for (var i = 0; i < zones.length; i++) {
                if (parseInt(zones[i].dataset.table) === tableNum) {
                    zones[i].classList.add('hidden');
                }
            }
        }
        
        log.innerHTML = '✅ Добавлен стол №' + tableNum;
        renderTableGrid();
    } else {
        log.innerHTML = '⚠️ Слишком маленькая область';
    }
    
    currentRect.remove();
    currentRect = null;
    isDrawing = false;
});

// ============================================================
// 7. СОЗДАНИЕ ЗОНЫ
// ============================================================
function createZoneElement(tableNum, x, y, w, h) {
    var div = document.createElement('div');
    div.className = 'zone';
    div.style.left = x + 'px';
    div.style.top = y + 'px';
    div.style.width = w + 'px';
    div.style.height = h + 'px';
    div.dataset.table = tableNum;
    
    var label = document.createElement('span');
    label.className = 'zone-label';
    label.textContent = '№' + tableNum;
    div.appendChild(label);
    
    var delBtn = document.createElement('button');
    delBtn.className = 'delete-zone-btn';
    delBtn.textContent = '×';
    delBtn.title = 'Удалить стол';
    delBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        deleteTable(tableNum);
    });
    div.appendChild(delBtn);
    
    div.addEventListener('click', function(e) {
        if (e.target.classList.contains('delete-zone-btn')) return;
        e.stopPropagation();
        selectTable(tableNum);
    });
    
    map.appendChild(div);
}

// ============================================================
// 8. УДАЛЕНИЕ СТОЛА
// ============================================================
function deleteTable(tableNum) {
    if (!confirm('Удалить стол №' + tableNum + '?')) return;
    
    var img = images[currentImageIndex];
    if (!img) return;
    
    var index = -1;
    for (var i = 0; i < img.zones.length; i++) {
        if (img.zones[i].table === tableNum) {
            index = i;
            break;
        }
    }
    if (index >= 0) {
        img.zones.splice(index, 1);
    }
    
    var elements = map.querySelectorAll('.zone');
    for (var j = 0; j < elements.length; j++) {
        if (parseInt(elements[j].dataset.table) === tableNum) {
            elements[j].remove();
        }
    }
    
    if (selectedTable === tableNum) {
        selectedTable = null;
        deviceList.innerHTML = '<p style="color:#999;">Выберите стол</p>';
    }
    
    renderTableGrid();
    log.innerHTML = '🗑️ Стол №' + tableNum + ' удалён';
}

// ============================================================
// 9. СНЯТЬ ВЫДЕЛЕНИЕ
// ============================================================
document.getElementById('deselectBtn').addEventListener('click', function() {
    selectedTable = null;
    document.querySelectorAll('.zone').forEach(function(el) {
        el.classList.remove('active');
    });
    document.querySelectorAll('.table-badge').forEach(function(el) {
        el.classList.remove('active');
    });
    deviceList.innerHTML = '<p style="color:#999;">Выберите стол</p>';
    log.innerHTML = '🔽 Выделение снято';
});

// ============================================================
// 10. ВЫБОР СТОЛА
// ============================================================
function selectTable(tableNum) {
    selectedTable = tableNum;
    
    document.querySelectorAll('.zone').forEach(function(el) {
        el.classList.remove('active');
        if (parseInt(el.datas (...)
