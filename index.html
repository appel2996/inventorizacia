<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Инвентаризация</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .panel { background: white; padding: 20px; border-radius: 12px; max-width: 1200px; margin: 0 auto; }
        .btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; }
        .btn-yellow { background: #ffc107; color: #333; }
        .flex { display: flex; flex-wrap: wrap; gap: 10px; }
        #map { width: 100%; min-height: 400px; border: 2px dashed #007bff; border-radius: 12px; margin: 10px 0; background: #f8f9fa; position: relative; overflow: hidden; }
        #map img { width: 100%; height: auto; display: block; }
        .log { background: #e9ecef; padding: 10px; border-radius: 6px; margin-top: 10px; }
        .zone { position: absolute; border: 2px solid blue; background: rgba(0,0,255,0.1); cursor: pointer; }
        .zone-label { position: absolute; top: -18px; left: 2px; font-size: 10px; background: white; padding: 0 4px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="panel">
    <h1>🗺️ Инвентаризация</h1>
    <div class="flex">
        <button class="btn btn-yellow" onclick="document.getElementById('fileInput').click()">📂 Загрузить</button>
        <button class="btn" onclick="addTable()">➕ Добавить стол</button>
        <button class="btn" style="background:#dc3545;color:white;" onclick="clearAll()">🗑️ Очистить</button>
        <input type="file" id="fileInput" accept="image/*" onchange="loadImage(this)">
    </div>
    <div id="map"><div style="padding:20px;text-align:center;color:#999;">Загрузите картинку</div></div>
    <div class="log" id="log">Готово!</div>
</div>

<script>
var tables = [];
var tableCounter = 0;
var imageData = null;

function logMsg(msg) { document.getElementById('log').innerHTML = msg; }

function loadImage(input) {
    var file = input.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        imageData = e.target.result;
        var map = document.getElementById('map');
        map.innerHTML = '<img src="' + imageData + '" />';
        for (var i = 0; i < tables.length; i++) {
            var t = tables[i];
            createZone(t.num, t.x, t.y);
        }
        logMsg('✅ Картинка загружена! Столов: ' + tables.length);
    };
    reader.readAsDataURL(file);
    input.value = '';
}

function addTable() {
    tableCounter++;
    var num = tableCounter;
    var map = document.getElementById('map');
    var rect = map.getBoundingClientRect();
    var x = 50 + Math.random() * (rect.width - 100);
    var y = 50 + Math.random() * (rect.height - 100);
    tables.push({ num: num, x: x, y: y });
    createZone(num, x, y);
    logMsg('✅ Добавлен стол №' + num);
}

function createZone(num, x, y) {
    var map = document.getElementById('map');
    var div = document.createElement('div');
    div.className = 'zone';
    div.style.left = x + 'px';
    div.style.top = y + 'px';
    div.style.width = '40px';
    div.style.height = '40px';
    div.innerHTML = '<span class="zone-label">№' + num + '</span>';
    div.onclick = function() { alert('Стол №' + num); logMsg('📍 Стол №' + num); };
    map.appendChild(div);
}

function clearAll() {
    if (!confirm('Удалить всё?')) return;
    tables = [];
    tableCounter = 0;
    document.getElementById('map').innerHTML = '<div style="padding:20px;text-align:center;color:#999;">Загрузите картинку</div>';
    logMsg('🗑️ Всё очищено');
}

logMsg('✅ Готово! Загрузите картинку или добавьте стол.');
</script>
</body>
</html>
